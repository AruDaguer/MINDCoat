<!DOCTYPE html>
<html lang="pt-br" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MINDCoat OS - Control Console</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        zinc: {
                            950: '#09090b', 900: '#18181b', 800: '#27272a',
                            700: '#3f3f46', 400: '#a1a1aa'
                        },
                        brand: {
                            blue: '#3b82f6', orange: '#f97316',
                            red: '#ef4444', green: '#10b981'
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="text-zinc-300 min-h-screen flex flex-col bg-zinc-950">

    {% include 'components/modal_pin.html' %}

    <div id="app-container" class="hidden flex flex-1 overflow-hidden">
        
        {% include 'components/sidebar.html' %}

        <main class="flex-1 flex flex-col min-w-0 bg-zinc-950 overflow-y-auto">
            
            <header class="h-14 border-b border-zinc-800 px-6 flex items-center justify-between bg-zinc-900 sticky top-0 z-10">
                <div class="flex items-center gap-3">
                    <button class="md:hidden text-zinc-400 hover:text-zinc-100"><i class="fa-solid fa-bars"></i></button>
                    <div class="flex items-center gap-2 px-2 py-1 bg-zinc-950 border border-zinc-800 rounded text-xs font-mono text-zinc-400">
                        <i class="fa-solid fa-microchip text-brand-blue"></i> Klipper Engine
                    </div>
                    <span id="status-bar-message" class="text-sm text-zinc-400 hidden sm:inline-block">Idle</span>
                </div>
                
                <div class="flex items-center gap-3">
                    <button onclick="sendAction('stop')" class="bg-brand-red/10 hover:bg-brand-red text-brand-red hover:text-white border border-brand-red/20 px-3 py-1.5 rounded text-xs font-bold transition-colors flex items-center gap-2">
                        <i class="fa-solid fa-triangle-exclamation"></i> ESTOP
                    </button>
                </div>
            </header>

            <div class="p-6">
                {% include 'components/tab_dashboard.html' %}
                {% include 'components/tab_params.html' %}
                {% include 'components/tab_thermal.html' %}
            </div>
            
        </main>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 right-6 bg-zinc-800 border border-zinc-700 p-3 rounded shadow-lg hidden flex items-center gap-3 transition-opacity duration-200 z-50 min-w-[250px]">
        <div id="toast-icon-wrapper" class="w-8 h-8 rounded bg-brand-green/10 flex items-center justify-center">
            <i id="toast-icon" class="fa-solid fa-check text-brand-green"></i>
        </div>
        <div class="flex-1">
            <span id="toast-msg" class="text-sm font-medium text-zinc-100"></span>
        </div>
    </div>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
